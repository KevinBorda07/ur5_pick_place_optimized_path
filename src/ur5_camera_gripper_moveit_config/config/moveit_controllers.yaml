# MoveIt joint trajectory controllers

controller_names:
  - joint_trajectory_controller
  - gripper_position_controller

joint_trajectory_controller:
  action_ns: follow_joint_trajectory
  type: FollowJointTrajectory
  default: true
  joints:
    - shoulder_pan_joint
    - shoulder_lift_joint
    - elbow_joint
    - wrist_1_joint
    - wrist_2_joint
    - wrist_3_joint

gripper_position_controller:
  action_ns: gripper_cmd
  type: GripperCommand
  default: true
  joints:
    - finger_joint
